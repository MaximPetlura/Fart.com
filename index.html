<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fart Detector Pro 💨 - Голосовий компас (затримка 1с)</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1e2a2c 0%, #0f1a1c 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Roboto', sans-serif;
            padding: 20px;
        }

        .detector-container {
            background: #fef3da;
            border-radius: 64px;
            padding: 20px 24px 28px 24px;
            box-shadow: 0 30px 35px -15px rgba(0,0,0,0.6), inset 0 1px 4px rgba(255,245,190,0.9);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 36px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.3), inset 0 0 0 2px rgba(255,250,200,0.8);
            cursor: crosshair;
            background-color: #ffffff;
            width: 100%;
            height: auto;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding: 10px 20px;
            background: #e9ddbc;
            border-radius: 60px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .status-badge {
            background: #2c3e2a;
            padding: 8px 22px;
            border-radius: 40px;
            color: #ffec9f;
            font-weight: bold;
            letter-spacing: 1px;
            font-size: 1rem;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.3), 0 2px 4px rgba(255,235,150,0.6);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-badge span {
            font-size: 1.3rem;
        }

        button {
            background: #5f7e4e;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 4px 0 #2c4424;
            font-family: inherit;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #2c4424;
        }

        .counter {
            background: #1f2e1c;
            padding: 6px 18px;
            border-radius: 32px;
            color: #ffdf8c;
            font-weight: bold;
            font-size: 1.2rem;
            font-family: monospace;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .direction-badge {
            background: #3a2e1f;
            padding: 4px 14px;
            border-radius: 32px;
            font-size: 0.9rem;
            color: #ffcc88;
            font-family: sans-serif;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 14px;
            color: #4f4a32;
            font-weight: 500;
        }

        @keyframes softPulse {
            0% { text-shadow: 0 0 0 #ffb347; opacity: 0.7;}
            100% { text-shadow: 0 0 6px #ff914d; opacity: 1;}
        }
        .fart-alert {
            animation: softPulse 0.2s ease-out;
        }
        .voice-active {
            background: #5f7e4e;
            transition: 0.1s;
        }
    </style>
</head>
<body>
<div>
    <div class="detector-container">
        <canvas id="fartCanvas" width="800" height="500" style="width:100%; height:auto; max-width:1000px; aspect-ratio:800/500"></canvas>
        <div class="info-panel">
            <div class="status-badge">
                <span>🧭💨</span> ДЕТЕКТОР ПЕРДІННЯ
            </div>
            <div class="counter">
                🎯 точка: <span id="pointIndicator">немає</span>
                <span id="directionText" class="direction-badge">---</span>
            </div>
            <button id="resetBtn">🗑️ Очистити</button>
        </div>
        <footer>👇 Клікни → звук + стрілка → через 1 секунду голос скаже напрямок (North/East/South/West)</footer>
    </div>
</div>

<script>
    (function() {
        // ---------- CANVAS ----------
        const canvas = document.getElementById('fartCanvas');
        const ctx = canvas.getContext('2d');
        const CANVAS_W = 800;
        const CANVAS_H = 500;
        canvas.width = CANVAS_W;
        canvas.height = CANVAS_H;
        
        // ----- СТАН -----
        let currentPoint = null;
        let arrowAngle = 0;
        let targetAngle = 0;
        let isRotating = false;
        let animFrameId = null;
        let rotationStart = 0;
        const ROTATION_MS = 500;
        
        let startRotAngle = 0;
        let endRotAngle = 0;
        
        // Аудіо дозвіл
        let audioAllowed = false;
        let audioCtx = null;
        
        // --- ЗВУК З GITHUB ---
        const FART_SOUND_URL = 'https://raw.githubusercontent.com/MaximPetlura/Fart.com/main/dry-fart.mp3';
        let externalFartAudio = null;
        
        // --- Таймер для голосу ---
        let voiceTimeout = null;
        
        // ---------- ФУНКЦІЯ НАПРЯМКУ (кут -> текст) ----------
        function getDirectionFromAngle(radians) {
            let degrees = radians * 180 / Math.PI;
            degrees = (degrees + 360) % 360;
            
            if ((degrees >= 316 && degrees <= 360) || (degrees >= 0 && degrees <= 45)) {
                return "North";
            } else if (degrees >= 46 && degrees <= 135) {
                return "East";
            } else if (degrees >= 136 && degrees <= 225) {
                return "South";
            } else if (degrees >= 226 && degrees <= 315) {
                return "West";
            }
            return "North";
        }
        
        // Голосове сповіщення (без затримки – викликається через таймаут)
        function speakDirection(direction) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(direction);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            utterance.pitch = 1.0;
            utterance.volume = 0.8;
            window.speechSynthesis.speak(utterance);
            
            const dirSpan = document.getElementById('directionText');
            if (dirSpan) {
                dirSpan.style.backgroundColor = "#5f7e4e";
                setTimeout(() => {
                    if(dirSpan) dirSpan.style.backgroundColor = "#3a2e1f";
                }, 300);
            }
        }
        
        function updateDirectionDisplay(direction) {
            const dirSpan = document.getElementById('directionText');
            if (dirSpan) dirSpan.innerText = direction;
        }
        
        // ---------- ГЕОМЕТРІЯ ----------
        function getCenter() {
            return { x: CANVAS_W/2, y: CANVAS_H/2 };
        }
        
        function getAngleToPoint(centerX, centerY, pointX, pointY) {
            const dx = pointX - centerX;
            const dy = pointY - centerY;
            return Math.atan2(dx, -dy);
        }
        
        function updatePointIndicator() {
            const span = document.getElementById('pointIndicator');
            if (span) {
                if (currentPoint) {
                    span.innerText = `x:${Math.round(currentPoint.x)} y:${Math.round(currentPoint.y)}`;
                    span.style.color = "#ffae70";
                } else {
                    span.innerText = "немає";
                    span.style.color = "#ffdf8c";
                }
            }
        }
        
        // ---------- МАЛЮВАННЯ ----------
        function drawCanvas() {
            if (!ctx) return;
            ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
            ctx.fillStyle = "#FFFFFF";
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            ctx.save();
            ctx.strokeStyle = "#e0e0e0";
            ctx.lineWidth = 1;
            for (let i = 0; i < CANVAS_W; i += 40) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, CANVAS_H);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(CANVAS_W, i);
                ctx.stroke();
            }
            
            if (currentPoint) {
                const px = currentPoint.x;
                const py = currentPoint.y;
                ctx.beginPath();
                ctx.arc(px, py, 12, 0, Math.PI*2);
                ctx.fillStyle = "#E34234";
                ctx.shadowBlur = 6;
                ctx.shadowColor = "rgba(200, 60, 40, 0.5)";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(px, py, 6, 0, Math.PI*2);
                ctx.fillStyle = "#ff7f4a";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(px-1, py-1, 3, 0, Math.PI*2);
                ctx.fillStyle = "#ffb347";
                ctx.fill();
                ctx.shadowColor = "transparent";
                ctx.beginPath();
                ctx.arc(px-3, py-4, 4, 0, Math.PI*2);
                ctx.fillStyle = "#ffccaa88";
                ctx.fill();
            }
            
            const center = getCenter();
            const arrowLen = 46;
            const headSize = 18;
            const currAngle = arrowAngle;
            
            const tipX = center.x + Math.sin(currAngle) * arrowLen;
            const tipY = center.y - Math.cos(currAngle) * arrowLen;
            const backX = center.x - Math.sin(currAngle) * (arrowLen * 0.2);
            const backY = center.y + Math.cos(currAngle) * (arrowLen * 0.2);
            
            ctx.beginPath();
            ctx.moveTo(backX, backY);
            ctx.lineTo(tipX, tipY);
            ctx.lineWidth = 5;
            ctx.strokeStyle = "#1E2F2F";
            ctx.shadowBlur = 3;
            ctx.stroke();
            
            const wingAng = Math.PI / 5.5;
            const leftX = tipX - Math.sin(currAngle - wingAng) * headSize;
            const leftY = tipY + Math.cos(currAngle - wingAng) * headSize;
            const rightX = tipX - Math.sin(currAngle + wingAng) * headSize;
            const rightY = tipY + Math.cos(currAngle + wingAng) * headSize;
            
            ctx.beginPath();
            ctx.moveTo(tipX, tipY);
            ctx.lineTo(leftX, leftY);
            ctx.lineTo(rightX, rightY);
            ctx.fillStyle = "#253b2b";
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(center.x, center.y, 9, 0, Math.PI*2);
            ctx.fillStyle = "#4f6b3c";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(center.x, center.y, 4, 0, Math.PI*2);
            ctx.fillStyle = "#f3c969";
            ctx.fill();
            ctx.shadowBlur = 0;
            
            ctx.font = "bold 11px 'Segoe UI'";
            ctx.fillStyle = "#9b875a";
            ctx.fillText("🎯 клікни → звук + стрілка → голос через 1с", 18, CANVAS_H-14);
            ctx.restore();
        }
        
        // Анімація повороту
        function startRotationAnimation(newTargetAngle) {
            if (animFrameId) cancelAnimationFrame(animFrameId);
            startRotAngle = arrowAngle;
            endRotAngle = newTargetAngle;
            rotationStart = performance.now();
            isRotating = true;
            
            function step(now) {
                const elapsed = now - rotationStart;
                let t = Math.min(1, elapsed / ROTATION_MS);
                const ease = 1 - Math.pow(1 - t, 3);
                let newAngle = lerpAngle(startRotAngle, endRotAngle, ease);
                arrowAngle = newAngle;
                drawCanvas();
                if (t < 1) {
                    animFrameId = requestAnimationFrame(step);
                } else {
                    arrowAngle = endRotAngle;
                    drawCanvas();
                    isRotating = false;
                    animFrameId = null;
                }
            }
            animFrameId = requestAnimationFrame(step);
        }
        
        function lerpAngle(a, b, t) {
            const diff = ((b - a) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
            const shortest = diff > Math.PI ? diff - (Math.PI * 2) : diff;
            return a + shortest * t;
        }
        
        // ---------- ЗВУК ----------
        function initExternalAudio() {
            if (!externalFartAudio) {
                externalFartAudio = new Audio(FART_SOUND_URL);
                externalFartAudio.preload = 'auto';
                externalFartAudio.crossOrigin = "Anonymous";
            }
        }
        
        function playFartSFX() {
            if (!audioAllowed) return;
            try {
                initExternalAudio();
                const soundClone = externalFartAudio.cloneNode();
                soundClone.volume = 0.65;
                soundClone.play().catch(err => {
                    console.warn("GitHub звук не грає:", err);
                    playSynthesizedFallback();
                });
            } catch(e) {
                playSynthesizedFallback();
            }
        }
        
        function playSynthesizedFallback() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = "sawtooth";
            osc.frequency.setValueAtTime(135, now);
            osc.frequency.exponentialRampToValueAtTime(55, now + 0.45);
            gain.gain.setValueAtTime(0.32, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(now + 0.45);
        }
        
        // ----- ОСНОВНА ЛОГІКА (з затримкою голосу 1 секунда) -----
        function setNewPointAndRotate(x, y) {
            // Скасовуємо попередній таймер голосу, якщо він ще не спрацював
            if (voiceTimeout) {
                clearTimeout(voiceTimeout);
                voiceTimeout = null;
            }
            
            currentPoint = { x, y };
            updatePointIndicator();
            playFartSFX();
            
            const center = getCenter();
            const angleRad = getAngleToPoint(center.x, center.y, x, y);
            targetAngle = angleRad;
            
            const direction = getDirectionFromAngle(angleRad);
            updateDirectionDisplay(direction);
            
            // Відкладене голосове повідомлення через 1 секунду
            voiceTimeout = setTimeout(() => {
                speakDirection(direction);
                voiceTimeout = null;
            }, 500);
            
            if (isRotating) {
                if (animFrameId) cancelAnimationFrame(animFrameId);
                isRotating = false;
            }
            startRotationAnimation(targetAngle);
            
            const indicatorSpan = document.getElementById('pointIndicator');
            if (indicatorSpan) {
                indicatorSpan.classList.add('fart-alert');
                setTimeout(() => indicatorSpan.classList.remove('fart-alert'), 200);
            }
        }
        
        function resetEverything() {
            // Скасовуємо запланований голос
            if (voiceTimeout) {
                clearTimeout(voiceTimeout);
                voiceTimeout = null;
            }
            // Зупиняємо поточну мову
            if (window.speechSynthesis) window.speechSynthesis.cancel();
            
            currentPoint = null;
            updatePointIndicator();
            updateDirectionDisplay("---");
            if (animFrameId) cancelAnimationFrame(animFrameId);
            isRotating = false;
            arrowAngle = 0;
            targetAngle = 0;
            drawCanvas();
        }
        
        // ---------- ОБРОБНИК КЛІКУ ----------
        function handleCanvasInteraction(e) {
            if (!audioAllowed) {
                audioAllowed = true;
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                initExternalAudio();
                if (window.speechSynthesis) {
                    const dummy = new SpeechSynthesisUtterance(" ");
                    window.speechSynthesis.speak(dummy);
                }
            }
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            canvasX = Math.min(Math.max(0, canvasX), CANVAS_W);
            canvasY = Math.min(Math.max(0, canvasY), CANVAS_H);
            
            const center = getCenter();
            if (Math.hypot(canvasX - center.x, canvasY - center.y) < 20) return;
            
            setNewPointAndRotate(canvasX, canvasY);
        }
        
        canvas.addEventListener('click', handleCanvasInteraction);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (e.touches.length) handleCanvasInteraction(e);
        });
        
        document.getElementById('resetBtn').addEventListener('click', () => resetEverything());
        
        resetEverything();
        
        function globalAudioUnlock() {
            if (!audioAllowed) {
                audioAllowed = true;
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                else if (!audioCtx) audioCtx = new AudioContext();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                initExternalAudio();
                if (window.speechSynthesis) {
                    const dummy = new SpeechSynthesisUtterance(" ");
                    window.speechSynthesis.speak(dummy);
                }
                document.removeEventListener('click', globalAudioUnlock);
                document.removeEventListener('touchstart', globalAudioUnlock);
            }
        }
        document.addEventListener('click', globalAudioUnlock);
        document.addEventListener('touchstart', globalAudioUnlock);
        
        window.addEventListener('resize', () => drawCanvas());
    })();
</script>
</body>
</html>
